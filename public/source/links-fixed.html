<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BM Organics | Links</title>

    <!-- TAILWIND -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FONT -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-[#f8f1e9] overflow-x-hidden relative min-h-screen">
    <!-- BACKGROUND FRUITS -->

    <img
      src="images/strawberry-top-left.png"
      class="fixed top-0 left-0 w-[130px] z-0 pointer-events-none"
    />

    <img
      src="images/strawberry-right.png"
      class="fixed top-[120px] -right-8 w-[120px] z-0 pointer-events-none"
    />

    <img
      src="images/strawberry-bottom-left.png"
      class="fixed bottom-0 -left-4 w-[150px] z-0 pointer-events-none"
    />

    <img
      src="images/strawberry-bowl.png"
      class="fixed bottom-0 right-0 w-[180px] z-0 pointer-events-none"
    />

    <!-- MAIN -->

    <main class="relative z-10 max-w-[430px] mx-auto px-4 py-10">
      <!-- LOGO -->

      <img
        src="images/logo.png"
        class="w-[100px] h-[100px] object-contain mx-auto rounded-full bg-white p-2 shadow-xl"
      />

      <!-- TITLE -->

      <h1
        class="text-center text-[38px] leading-tight font-extrabold text-[#0f5c2c] mt-5"
      >
        Fruit Bites 🍓
      </h1>

      <p class="text-center text-[18px] font-medium text-[#222] mt-2">
        Freeze-Dried Fruit Snacks
      </p>

      <p class="text-center text-[24px] font-semibold text-[#f06d86] mt-3">
        Just Fruit. Nothing Else.
      </p>

      <!-- BADGES -->

      <div class="flex flex-wrap justify-center gap-4 mt-7">
        <div class="text-[13px] font-medium text-[#222]">
          🍃 100% Real Fruit
        </div>

        <div class="text-[13px] font-medium text-[#222]">❌ No Added Sugar</div>

        <div class="text-[13px] font-medium text-[#222]">
          🌱 Nothing Artificial
        </div>
      </div>

      <!-- CARDS -->

      <div class="flex flex-col gap-5 mt-8">

        <a
          href="https://wa.me/919901919978"
          target="_blank"
          class="block transition duration-300 hover:-translate-y-1"
        >
          <img
            src="images/contact-whatsapp.png"
            class="w-full rounded-[28px] shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
          />
        </a>

        <a
          href="#"
          class="block transition duration-300 hover:-translate-y-1"
        >
          <img
            src="images/Meesho.png"
            class="w-full rounded-[28px] shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
          />
        </a>

        <a
          href="#"
          class="block transition duration-300 hover:-translate-y-1"
        >
          <img
            src="images/whatarefruitbites.png"
            class="w-full rounded-[28px] shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
          />
        </a>

        <a
          href="#"
          class="block transition duration-300 hover:-translate-y-1"
        >
          <img
            src="images/Find us.png"
            class="w-full rounded-[28px] shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
          />
        </a>

        <a
          href="#"
          class="block transition duration-300 hover:-translate-y-1"
        >
          <img
            src="images/explore.png"
            class="w-full rounded-[28px] shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
          />
        </a>

      </div>

      <!-- INSTAGRAM -->

      <div class="mt-10 text-center">
        <p class="text-[20px] font-semibold text-[#222] mb-5">
          Follow us on Instagram
        </p>

        <a
          href="https://instagram.com/"
          target="_blank"
          class="w-[72px] h-[72px] rounded-full bg-white flex items-center justify-center mx-auto shadow-xl transition duration-300 hover:scale-105"
        >
          <img src="images/instagram-icon.png" class="w-[42px]" />
        </a>
      </div>
    </main>
  </body>
</html>
